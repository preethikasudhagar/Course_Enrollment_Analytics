name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *" # Runs every 10 minutes to prevent Render free tier from sleeping
  workflow_dispatch: # Allows running manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          echo "Pinging https://course-analytics-backend.onrender.com/ to keep it awake..."
          curl -s https://course-analytics-backend.onrender.com/ > /dev/null
          echo "Ping successful!"
