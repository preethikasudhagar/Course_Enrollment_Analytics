services:
  # Backend Web Service
  - type: web
    name: course-analytics-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in the Render Dashboard (Aiven MySQL URL)
      - key: PORT
        value: 8000
      - key: FRONTEND_URL
        value: https://course-analytics-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: course-analytics-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://course-analytics-backend.onrender.com
      - key: SKIP_PREFLIGHT_CHECK
        value: "true"
    # For Vite apps on Render, we need to handle routing for SPA
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
